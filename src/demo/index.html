<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>MSA Viewer WebGPU</title>
    <style>
        :root {
            color-scheme: light dark;
            --page-bg: light-dark(#eee, #202020);
            --page-fg: light-dark(#202020, #fff);
            --panel-bg: light-dark(rgba(255, 255, 255, 0.7), rgba(20, 20, 20, 0.9));
            --panel-border: light-dark(rgba(30, 30, 30, 0.12), rgba(255, 255, 255, 0.08));
            --panel-shadow: light-dark(0 1px 2px rgba(15, 23, 42, 0.06), none);
            --control-bg: light-dark(#ffffff, #1d2128);
            --control-border: light-dark(rgba(30, 30, 30, 0.12), rgba(255, 255, 255, 0.1));
            --control-hover-border: light-dark(rgba(79, 124, 255, 0.45), rgba(130, 160, 255, 0.6));
            --control-focus-border: light-dark(#4f7cff, #82a0ff);
            --control-focus-ring: light-dark(0 0 0 3px rgba(79, 124, 255, 0.18), 0 0 0 3px rgba(130, 160, 255, 0.2));
            --header-bg: light-dark(#f0f0f0, #161616);
            --header-border: light-dark(rgba(30, 30, 30, 0.1), rgba(255, 255, 255, 0.08));
            --viewer-bg: light-dark(#f0f0f0, #161616);
            --viewer-border: light-dark(#555, rgba(255, 255, 255, 0.18));
            --grid-line: light-dark(rgba(0, 0, 0, 0.05), rgba(255, 255, 255, 0.03));
            --scroller-bg: light-dark(#fff, #111);
            --button-bg: light-dark(#4f7cff, #5f86ff);
            --button-hover-bg: light-dark(#658cff, #7394ff);
            --button-fg: #fff;
        }
        :root[data-theme="dark"] {
            color-scheme: dark;
        }
        :root[data-theme="light"] {
            color-scheme: light;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: var(--page-bg);
            color: var(--page-fg);
            font-family: "IBM Plex Sans", sans-serif;
        }
        .toolbar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        .scheme-switcher {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            border: 1px solid var(--panel-border);
            border-radius: 10px;
            background: var(--panel-bg);
            box-shadow: var(--panel-shadow);
        }
        .scheme-switcher label {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.01em;
        }
        .scheme-switcher select {
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            min-width: 124px;
            padding: 8px 34px 8px 12px;
            border: 1px solid var(--control-border);
            border-radius: 8px;
            background-color: var(--control-bg);
            background-image:
                linear-gradient(45deg, transparent 50%, currentColor 50%),
                linear-gradient(135deg, currentColor 50%, transparent 50%);
            background-position:
                calc(100% - 16px) calc(50% - 2px),
                calc(100% - 11px) calc(50% - 2px);
            background-size: 5px 5px, 5px 5px;
            background-repeat: no-repeat;
            color: inherit;
            font: inherit;
            line-height: 1.2;
            cursor: pointer;
            transition: border-color 120ms ease, background-color 120ms ease, box-shadow 120ms ease;
        }
        .scheme-switcher select:hover {
            border-color: var(--control-hover-border);
        }
        .scheme-switcher select:focus {
            outline: none;
            border-color: var(--control-focus-border);
            box-shadow: var(--control-focus-ring);
        }
        .msa-headers::-webkit-scrollbar {
            display: none;
        }
        .viewer-shell {
            position: relative;
            width: 95vw;
            height: 90vh;
            border: 1px solid var(--viewer-border);
            background: var(--viewer-bg);
            overflow: hidden;
            display: grid;
            grid-template-columns: auto minmax(0, 1fr);
            grid-template-rows: 120px minmax(0, 1fr);
        }
        .viewer-shell:not([data-loaded="true"]) {
            grid-template-rows: minmax(0, 1fr);
        }
        .viewer-shell:not([data-loaded="true"]) .viewer-body {
            grid-column: 1 / -1;
            grid-row: 1;
        }
        .viewer-shell[data-loaded="true"] .viewer-body {
            grid-column: 2;
            grid-row: 2;
        }
        .msa-minimap {
            border: 1px solid grey;
        }
        .msa-minimap-spacer {
            grid-column: 1;
            grid-row: 1;
        }
        .msa-minimap-body {
            grid-column: 2;
            grid-row: 1;
            min-width: 0;
            padding: 8px;
        }
        .msa-headers {
            grid-column: 1;
            grid-row: 2;
        }
        .viewer-body {
            grid-column: 2;
            grid-row: 2;
            position: relative;
            flex: 1 1 auto;
            min-width: 0;
            height: 100%;
            overflow: hidden;
        }
        .msa-alignment-scroller {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: auto;
            background:
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px),
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                var(--scroller-bg);
            background-size: 16px 16px;
        }
        .msa-alignment-spacer {
            width: 1px;
            height: 1px;
        }
        .msa-alignment-canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
            pointer-events: none;
        }
        button {
            border: 0;
            padding: 10px 14px;
            background: var(--button-bg);
            color: var(--button-fg);
            border-radius: 8px;
            cursor: pointer;
        }
        button:hover {
            background: var(--button-hover-bg);
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <div class="scheme-switcher">
            <label for="scheme-select">Color Scheme:</label>
            <select id="scheme-select">
                <optgroup label="Column Statistics">
                    <option value="clustalx">ClustalX</option>
                    <option value="pid">PID</option>
                    <option value="blosum62">BLOSUM62</option>
                </optgroup>
                <optgroup label="Residue Properties">
                    <option value="hydrophobicity">Hydrophobicity</option>
                    <option value="zappo">Zappo</option>
                    <option value="taylor">Taylor</option>
                    <option value="gecosBlossom">GECOS Blossom</option>
                    <option value="gecosSunset">GECOS Sunset</option>
                    <option value="gecosOcean">GECOS Ocean</option>
                    <option value="helixPropensity">Helix Propensity</option>
                    <option value="strandPropensity">Strand Propensity</option>
                    <option value="turnPropensity">Turn Propensity</option>
                    <option value="buriedIndex">Buried Index</option>
                </optgroup>
            </select>
        </div>
        <div class="file-loader">
            <button id="upload-button" type="button">Open FASTA Alignment</button>
            <input type="file" id="file-input" accept=".fa,.fasta,.fas,.aln,.txt,.a3m" hidden>
            <span id="status">Load an alignment to begin.</span>
        </div>
    </div>
    <div class="viewer-shell" id="viewer"></div>
    <script type="module" src="./app.js"></script>
</body>
</html>
