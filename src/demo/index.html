<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>MSA Viewer WebGPU</title>
    <style>
        :root {
            color-scheme: light dark;
            --page-bg: light-dark(#eee, #202020);
            --page-fg: light-dark(#202020, #fff);
            --panel-bg: light-dark(rgba(255, 255, 255, 1.0), rgba(20, 20, 20, 1.0));
            --panel-border: light-dark(rgba(30, 30, 30, 0.12), rgba(255, 255, 255, 0.08));
            --panel-shadow: light-dark(0 1px 2px rgba(15, 23, 42, 0.06), none);
            --control-bg: light-dark(#ffffff, #1d2128);
            --control-border: light-dark(rgba(30, 30, 30, 0.12), rgba(255, 255, 255, 0.1));
            --control-hover-border: light-dark(rgba(79, 124, 255, 0.45), rgba(130, 160, 255, 0.6));
            --control-focus-border: light-dark(#4f7cff, #82a0ff);
            --control-focus-ring: light-dark(0 0 0 3px rgba(79, 124, 255, 0.18), 0 0 0 3px rgba(130, 160, 255, 0.2));
            --header-bg: light-dark(#f0f0f0, #161616);
            --header-border: light-dark(rgba(30, 30, 30, 0.1), rgba(255, 255, 255, 0.08));
            --viewer-bg: light-dark(#f0f0f0, #161616);
            --viewer-border: light-dark(#555, rgba(255, 255, 255, 0.18));
            --grid-line: light-dark(rgba(0, 0, 0, 0.05), rgba(255, 255, 255, 0.03));
            --scroller-bg: light-dark(#fff, #111);
            --button-bg: light-dark(#4f7cff, #5f86ff);
            --button-hover-bg: light-dark(#658cff, #7394ff);
            --button-fg: #fff;
            --button-disabled-bg: light-dark(#c8c8c8, #d9d9d9);
            --button-disabled-fg: #000;
        }
        :root[data-theme="dark"] {
            color-scheme: dark;
        }
        :root[data-theme="light"] {
            color-scheme: light;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: var(--page-bg);
            color: var(--page-fg);
            font-family: "IBM Plex Sans", sans-serif;
        }
        .toolbar {
            width: min(95vw, 1600px);
            display: grid;
            gap: 12px;
            margin-bottom: 16px;
        }
        .toolbar-row {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }
        .toolbar-row.controls {
            flex-wrap: wrap;
        }
        .loader-anchor {
            position: relative;
            flex: 0 0 auto;
        }
        .scheme-switcher {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            border: 1px solid var(--panel-border);
            border-radius: 10px;
            background: var(--panel-bg);
            box-shadow: var(--panel-shadow);
        }
        .scheme-switcher.scheme-control {
            width: 260px;
            justify-content: space-between;
        }
        .scheme-switcher label {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.01em;
            flex: 0 0 auto;
        }
        .control-select {
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            min-width: 124px;
            padding: 8px 34px 8px 12px;
            border: 1px solid var(--control-border);
            border-radius: 8px;
            background-color: var(--control-bg);
            background-image:
                linear-gradient(45deg, transparent 50%, currentColor 50%),
                linear-gradient(135deg, currentColor 50%, transparent 50%);
            background-position:
                calc(100% - 16px) calc(50% - 2px),
                calc(100% - 11px) calc(50% - 2px);
            background-size: 5px 5px, 5px 5px;
            background-repeat: no-repeat;
            color: inherit;
            font: inherit;
            line-height: 1.2;
            cursor: pointer;
            transition: border-color 120ms ease, background-color 120ms ease, box-shadow 120ms ease;
        }
        .control-select:hover {
            border-color: var(--control-hover-border);
        }
        .control-select:focus {
            outline: none;
            border-color: var(--control-focus-border);
            box-shadow: var(--control-focus-ring);
        }
        .scheme-switcher.scheme-control .control-select {
            min-width: 0;
            width: 140px;
        }
        .viewer-host {
            position: relative;
            width: 95vw;
            height: 90vh;
            border: 1px solid var(--viewer-border);
            background: var(--viewer-bg);
            overflow: hidden;
        }
        button {
            border: 0;
            padding: 10px 14px;
            background: var(--button-bg);
            color: var(--button-fg);
            border-radius: 8px;
            cursor: pointer;
        }
        button:hover {
            background: var(--button-hover-bg);
        }
        button:disabled {
            background: var(--button-disabled-bg);
            color: var(--button-disabled-fg);
        }
        .pending-modal[hidden] {
            display: none;
        }
        .pending-modal {
            position: absolute;
            top: calc(100% + 10px);
            left: 0;
            z-index: 20;
            width: min(400px, calc(100vw - 32px));
        }
        .pending-modal-card {
            width: 100%;
            max-height: min(70vh, 520px);
            display: grid;
            gap: 12px;
            padding: 14px;
            border: 1px solid var(--panel-border);
            border-radius: 14px;
            background: var(--panel-bg);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.18);
            overflow: auto;
        }
        .pending-modal-title h2 {
            margin: 0;
            font-size: 15px;
        }
        .pending-modal-title p {
            margin: 0;
            font-size: 13px;
            opacity: 0.78;
        }
        .pending-file-list {
            display: grid;
            gap: 10px;
        }
        .pending-file-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 148px;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border: 1px solid var(--control-border);
            border-radius: 12px;
            background: var(--control-bg);
        }
        .pending-file-name {
            font-size: 13px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .pending-file-row .control-select {
            min-width: 0;
            width: 100%;
        }
        .column-selection-info {
            flex: 0 0 auto;
        }
        #status {
            min-width: 0;
            flex: 1 1 auto;
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
        }
        @media (max-width: 900px) {
            .toolbar-row {
                flex-wrap: wrap;
            }
            .pending-modal {
                left: 0;
                right: auto;
                width: min(420px, calc(100vw - 32px));
            }
            .pending-file-row {
                grid-template-columns: 1fr;
            }
            #status {
                white-space: normal;
            }
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <div class="toolbar-row controls">
            <div class="loader-anchor">
                <button id="upload-button" type="button">Open Alignment Files</button>
                <div class="pending-modal" id="pending-files-panel" hidden>
                    <div class="pending-modal-card" role="dialog" aria-labelledby="pending-modal-title">
                        <div class="pending-modal-title">
                            <p>Choose alphabets for alignments, then load.</p>
                        </div>
                        <div class="pending-file-list" id="pending-file-list"></div>
                        <button id="load-files-button" type="button" disabled>Load Files</button>
                    </div>
                </div>
            </div>
            <div class="scheme-switcher scheme-control">
                <label for="scheme-select">Color Scheme:</label>
                <select id="scheme-select" class="control-select">
                    <optgroup label="Column Statistics">
                        <option value="clustalx">ClustalX</option>
                        <option value="pid">Identity</option>
                        <option value="blosum62">Similarity</option>
                    </optgroup>
                    <optgroup label="Residue Properties">
                        <option value="hydrophobicity">Hydrophobicity</option>
                        <option value="zappo">Zappo</option>
                        <option value="taylor">Taylor</option>
                        <option value="gecosBlossom">GECOS Blossom</option>
                        <option value="gecosSunset">GECOS Sunset</option>
                        <option value="gecosOcean">GECOS Ocean</option>
                        <option value="helixPropensity">Helix Propensity</option>
                        <option value="strandPropensity">Strand Propensity</option>
                        <option value="turnPropensity">Turn Propensity</option>
                        <option value="buriedIndex">Buried Index</option>
                        <option value="3di">3Di</option>
                    </optgroup>
                </select>
            </div>
            <div class="scheme-switcher scheme-control">
                <label for="representation-select">Representation:</label>
                <select id="representation-select" class="control-select" disabled>
                    <option value="">None loaded</option>
                </select>
            </div>
            <div class="column-selection-info">
                <button disabled id="clear-selection-button">Clear selected columns</button>
            </div>
            <input type="file" id="file-input" accept=".fa,.fasta,.fas,.aln,.txt,.a3m" multiple hidden>
        </div>
        <span id="status">Load an alignment to begin.</span>
    </div>
    <div class="viewer-host" id="viewer"></div>
    <script type="module" src="./app.js"></script>
</body>
</html>
