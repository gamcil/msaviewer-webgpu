<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>MSA Viewer WebGPU</title>
    <style>
        :root {
            color-scheme: light dark;
            --page-bg: light-dark(#eee, #202020);
            --page-fg: light-dark(#202020, #fff);
            --panel-bg: light-dark(rgba(255, 255, 255, 1.0), rgba(20, 20, 20, 1.0));
            --panel-border: light-dark(rgba(30, 30, 30, 0.12), rgba(255, 255, 255, 0.08));
            --panel-shadow: light-dark(0 1px 2px rgba(15, 23, 42, 0.06), none);
            --control-bg: light-dark(#ffffff, #1d2128);
            --control-border: light-dark(rgba(30, 30, 30, 0.12), rgba(255, 255, 255, 0.1));
            --control-hover-border: light-dark(rgba(79, 124, 255, 0.45), rgba(130, 160, 255, 0.6));
            --control-focus-border: light-dark(#4f7cff, #82a0ff);
            --control-focus-ring: light-dark(0 0 0 3px rgba(79, 124, 255, 0.18), 0 0 0 3px rgba(130, 160, 255, 0.2));
            --viewer-bg: light-dark(#f0f0f0, #161616);
            --button-bg: light-dark(#4f7cff, #5f86ff);
            --button-hover-bg: light-dark(#658cff, #7394ff);
            --button-fg: #fff;
            --button-disabled-bg: light-dark(#c8c8c8, #d9d9d9);
            --button-disabled-fg: #000;
        }
        :root[data-theme="dark"] {
            color-scheme: dark;
        }
        :root[data-theme="light"] {
            color-scheme: light;
        }
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
        }
        body {
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            background-color: var(--page-bg);
            color: var(--page-fg);
            font-family: "IBM Plex Sans", sans-serif;
        }
        .toolbar {
            flex: 0 0 auto;
            width: 100%;
            display: grid;
            gap: 6px;
            box-sizing: border-box;
        }
        .toolbar-row {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }
        .toolbar-row.controls {
            position: relative;
            padding: 10px 12px;
            border: 1px solid var(--panel-border);
            background: var(--panel-bg);
            box-shadow: var(--panel-shadow);
            overflow: visible;
        }
        .toolbar-strip {
            min-width: 0;
            flex: 1 1 auto;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .toolbar-group {
            display: inline-flex;
            align-items: flex-end;
            gap: 8px;
            flex: 0 0 auto;
            min-width: 0;
        }
        .toolbar-separator {
            flex: 0 0 auto;
            width: 1px;
            height: 24px;
            background: var(--panel-border);
        }
        .toolbar-statusbar {
            min-width: 0;
            padding: 0 0 4px 8px;
        }
        .loader-anchor {
            position: relative;
            flex: 0 0 auto;
        }
        .toolbar-action {
            display: inline-flex;
            align-items: flex-end;
            min-height: 100%;
        }
        .toolbar-field {
            display: grid;
            justify-items: center;
            gap: 4px;
            flex: 0 0 auto;
            min-width: 0;
        }
        .toolbar-field label {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.01em;
            opacity: 0.78;
            white-space: nowrap;
            text-align: center;
        }
        .control-select {
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            min-width: 0;
            padding: 6px 28px 6px 10px;
            border: 1px solid var(--control-border);
            border-radius: 6px;
            background-color: var(--control-bg);
            background-image:
                linear-gradient(45deg, transparent 50%, currentColor 50%),
                linear-gradient(135deg, currentColor 50%, transparent 50%);
            background-position:
                calc(100% - 16px) calc(50% - 2px),
                calc(100% - 11px) calc(50% - 2px);
            background-size: 5px 5px, 5px 5px;
            background-repeat: no-repeat;
            color: inherit;
            font: inherit;
            font-size: 13px;
            line-height: 1.2;
            cursor: pointer;
            transition: border-color 120ms ease, background-color 120ms ease, box-shadow 120ms ease;
        }
        .control-select:hover {
            border-color: var(--control-hover-border);
        }
        .control-select:focus {
            outline: none;
            border-color: var(--control-focus-border);
            box-shadow: var(--control-focus-ring);
        }
        .toolbar-field .control-select {
            width: 150px;
        }
        select#representation-select {
            width: 180px;
        }
        .mask-control {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .mask-label {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.01em;
            opacity: 0.78;
            white-space: nowrap;
        }
        .mask-toggle {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.01em;
            white-space: nowrap;
            text-align: center;
        }
        .mask-toggle input[type="checkbox"] {
            margin: 0;
        }
        .toolbar-check {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            font-weight: 500;
            white-space: nowrap;
        }
        .toolbar-check input[type="checkbox"] {
            margin: 0;
        }
        .toolbar-popover-anchor {
            position: relative;
            flex: 0 0 auto;
            display: inline-flex;
            align-items: stretch;
        }
        .toolbar-popover-panel[hidden] {
            display: none;
        }
        .toolbar-popover-panel {
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            z-index: 20;
            width: max-content;
            min-width: min(fit-content, 280px);
            max-width: min(560px, calc(100vw - 24px));
            padding: 10px;
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            background: var(--panel-bg);
            box-shadow: var(--panel-shadow);
            overflow: auto;
        }
        .toolbar-popover-header {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            position: relative;
            min-height: 18px;
        }
        .toolbar-popover-title {
            font-size: 12px;
            font-weight: 600;
            opacity: 0.78;
        }
        .toolbar-popover-meta {
            position: absolute;
            top: 0;
            right: 0;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            white-space: nowrap;
        }
        #track-display-mode-label {
            opacity: 0.72;
        }
        .toolbar .toolbar-popover-panel button,
        .toolbar .pending-modal button {
            min-height: 0 !important;
            height: auto !important;
            /* padding: 6px 10px; */
            font-size: 14px;
            /* line-height: 1.2; */
        }
        .toolbar-popover-reset {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            min-width: 20px;
            padding: 0 !important;
            border: 0;
            background: transparent;
            color: var(--button-bg);
            font-size: 22px;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            font-weight: 1000;
            line-height: 1;
            border-radius: 0;
        }
        .toolbar-popover-reset[aria-hidden="true"] {
            visibility: hidden;
            pointer-events: none;
        }
        .toolbar-popover-reset:hover {
            background: transparent;
            opacity: 1;
        }
        .track-popover-table {
            display: grid;
            grid-template-columns: max-content repeat(4, max-content);
            align-items: center;
            column-gap: 10px;
            row-gap: 6px;
            width: max-content;
        }
        .track-popover-name {
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
            padding-right: 6px;
        }
        .track-popover-empty {
            width: 0;
            height: 0;
        }
        .track-popover-variant {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            white-space: nowrap;
        }
        .track-popover-variant input {
            margin: 0;
        }
        .mask-input {
            width: 64px;
            min-width: 0;
            padding: 6px 10px;
            border: 1px solid var(--control-border);
            border-radius: 6px;
            background-color: var(--control-bg);
            color: inherit;
            font: inherit;
            font-size: 13px;
            line-height: 1.2;
            transition: border-color 120ms ease, background-color 120ms ease, box-shadow 120ms ease;
        }
        .mask-input:hover {
            border-color: var(--control-hover-border);
        }
        .mask-input:focus {
            outline: none;
            border-color: var(--control-focus-border);
            box-shadow: var(--control-focus-ring);
        }
        .mask-input:disabled {
            opacity: 0.6;
        }
        .viewer-host {
            position: relative;
            flex: 1 1 auto;
            width: 100vw;
            min-height: 0;
            background: var(--viewer-bg);
            overflow: hidden;
        }
        button {
            border: 0;
            padding: 7px 10px;
            background: var(--button-bg);
            color: var(--button-fg);
            border-radius: 6px;
            cursor: pointer;
            font: inherit;
            font-size: 13px;
            line-height: 1.2;
            white-space: nowrap;
        }
        .toolbar button {
            height: 50px;
        }
        button:hover {
            background: var(--button-hover-bg);
        }
        button:disabled {
            background: var(--button-disabled-bg);
            color: var(--button-disabled-fg);
        }
        .pending-modal[hidden] {
            display: none;
        }
        .pending-modal {
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            z-index: 20;
            width: min(360px, calc(100vw - 32px));
        }
        .pending-modal-card {
            width: 100%;
            max-height: min(70vh, 520px);
            display: grid;
            gap: 12px;
            padding: 14px;
            border: 1px solid var(--panel-border);
            border-radius: 14px;
            background: var(--panel-bg);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.18);
            overflow: auto;
        }
        .pending-modal-title h2 {
            margin: 0;
            font-size: 15px;
        }
        .pending-modal-title p {
            margin: 0;
            font-size: 13px;
            opacity: 0.78;
        }
        .pending-file-list {
            display: grid;
            gap: 10px;
        }
        .pending-file-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 148px;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border: 1px solid var(--control-border);
            border-radius: 12px;
            background: var(--control-bg);
        }
        .pending-file-name {
            font-size: 13px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .pending-file-row .control-select {
            min-width: 0;
            width: 100%;
        }
        .column-selection-info {
            flex: 0 0 auto;
        }
        #status {
            min-width: 0;
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        @media (max-width: 900px) {
            .pending-file-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <div class="toolbar-row controls" role="toolbar" aria-label="MSA demo controls">
                <div class="toolbar-group">
                    <div class="loader-anchor toolbar-action">
                        <button id="upload-button" type="button">Open<br>Files</button>
                        <div class="pending-modal" id="pending-files-panel" hidden>
                            <div class="pending-modal-card" role="dialog" aria-labelledby="pending-modal-title">
                                <div class="pending-modal-title">
                                    <p>Choose alphabets for alignments, then load.</p>
                                </div>
                                <div class="pending-file-list" id="pending-file-list"></div>
                                <button id="load-files-button" type="button" disabled>Load files</button>
                            </div>
                        </div>
                    </div>
                </div>
            <div class="toolbar-strip">
                <div class="toolbar-group">
                    <div class="toolbar-field">
                        <label for="representation-select">Representation</label>
                        <select id="representation-select" class="control-select" disabled>
                            <option value="">None loaded</option>
                        </select>
                    </div>
                </div>
                <div class="toolbar-separator" aria-hidden="true"></div>
                <div class="toolbar-group">
                    <div class="toolbar-field">
                        <label for="scheme-select">Scheme</label>
                        <select id="scheme-select" class="control-select"></select>
                    </div>
                </div>
                <div class="toolbar-separator" aria-hidden="true"></div>
                <div class="toolbar-group">
                    <div class="toolbar-field">
                        <label class="mask-toggle" for="hide-insertions-checkbox">Hide<br>Insertions</label>
                        <input id="hide-insertions-checkbox" type="checkbox">
                    </div>
                </div>
                <div class="toolbar-separator" aria-hidden="true"></div>
                <div class="toolbar-group">
                    <div class="toolbar-field">
                        <label class="mask-toggle" for="gap-threshold-input">Filter Gaps</label>
                        <input
                            id="gap-threshold-input"
                            class="mask-input"
                            type="number"
                            min="0"
                            max="1"
                            step="0.05"
                            placeholder="off"
                        >
                    </div>
                </div>
                <div class="toolbar-separator" aria-hidden="true"></div>
                <div class="toolbar-group">
                    <div class="toolbar-field">
                        <label for="selection-mode-select">Selection Mode</label>
                        <select id="selection-mode-select" class="control-select">
                            <option value="column">Columns</option>
                            <option value="row">Rows</option>
                            <option value="cell">Cells</option>
                        </select>
                    </div>
                </div>
                <div class="toolbar-separator" aria-hidden="true"></div>
                <div class="toolbar-group">
                    <div class="toolbar-action">
                        <button disabled id="clear-selection-button">Clear<br>Selection</button>
                    </div>                           
                </div>
                <div class="toolbar-separator" aria-hidden="true"></div>
                <div class="toolbar-group">
                    <div class="toolbar-popover-anchor">
                        <div class="toolbar-action">
                            <button id="track-menu-button" type="button">Tracks</button>
                        </div>
                        <div class="toolbar-popover-panel" id="track-menu-panel" hidden>
                            <div class="toolbar-popover-header">
                                <div class="toolbar-popover-title">Tracks</div>
                                <div class="toolbar-popover-meta">
                                    <span id="track-display-mode-label">Active only</span>
                                    <button id="reset-track-defaults-button" class="toolbar-popover-reset" type="button" aria-hidden="true" aria-label="Reset to active-only" title="Reset to active-only">&#8635;</button>
                                </div>
                            </div>
                            <div class="track-popover-table" id="track-toggle-list"></div>
                        </div>
                    </div>
                </div>
                <div class="toolbar-separator" aria-hidden="true"></div>
                <div class="toolbar-group">
                    <div class="toolbar-action">
                        <button id="motif-search-button" type="button">Motif<br>Search</button>
                    </div>
                </div>
                <input type="file" id="file-input" accept=".fa,.fasta,.fas,.aln,.txt,.a3m" multiple hidden>
            </div>
        </div>
        <div class="toolbar-statusbar"><span id="status">Load an alignment to begin.</span></div>
    </div>
    <div class="viewer-host" id="viewer"></div>
    <script type="module" src="./app.js"></script>
</body>
</html>
